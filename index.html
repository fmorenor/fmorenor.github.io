<html lang="es" class="scroll-smooth">

    <script type="module" crossorigin src="./assets/index-DnxW7q2B.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CPcc1KG7.css">
    <style>#xray { display: none !important; }</style>

  <body>
    <div id="root"></div>
  <script>
  /* ── Reemplaza la sección "cost" con charts modernos ── */
  (function injectCostCharts() {
    const NS = 'http://www.w3.org/2000/svg';
    /* B = ganador (CartoData), A = sin cambio */
    const DATA = [
      { label: '2020', a: 7.8,  b: 8   },
      { label: '2021', a: 8.3,  b: 11.5 },
      { label: '2022', a: 9.0,  b: 16.8 },
      { label: '2023', a: 9.5,  b: 21.4 },
      { label: '2024', a: 10,   b: 26  },
    ];
    const MAX_V = 28;

    function css(v) {
      return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || (v === '--blue' ? '#2244cc' : v === '--line-b' ? '#5f5f5b' : '#888');
    }

    function mk(tag, attrs, text) {
      const el = document.createElementNS(NS, tag);
      Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function animateStat(el, target, prefix, suffix, dur) {
      if (!el) return;
      const t0 = performance.now();
      function tick(now) {
        const t = Math.min(1, (now - t0) / dur);
        const e = 1 - Math.pow(1 - t, 3);
        const val = target % 1 === 0 ? Math.round(e * target) : (e * target).toFixed(1);
        el.textContent = prefix + val + suffix;
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    let chartDrawn = false, statsAnimated = false, barsDrawn = false;

    function buildChart(prog) {
      const svg = document.getElementById('cd-chartSvg');
      if (!svg) return;
      svg.innerHTML = '';
      const BLUE  = '#3b5bdb';
      const GRAY  = '#94a3b8';
      const GRID  = '#e2e8f0';
      const LABEL = '#64748b';
      const fnt   = 'DM Sans, system-ui, sans-serif';
      const VW = 580, VH = 300;
      const PL = 44, PR = 52, PT = 20, PB = 40;
      const CW = VW - PL - PR, CH = VH - PT - PB, n = DATA.length;
      const ease = p => 1 - Math.pow(1 - p, 3);
      const sx = i => PL + (i / (n - 1)) * CW;
      const sy = v  => PT + CH - (v / MAX_V) * CH;

      function buildPts(key) {
        const sweepX = PL + ease(prog) * CW;
        const pts = [];
        for (let i = 0; i < n; i++) {
          if (sx(i) > sweepX) break;
          pts.push([sx(i), sy(DATA[i][key])]);
        }
        const li = pts.length - 1;
        if (li >= 0 && li < n - 1) {
          const t = (sweepX - sx(li)) / (sx(li+1) - sx(li));
          pts.push([sweepX, sy(DATA[li][key] + (DATA[li+1][key] - DATA[li][key]) * t)]);
        }
        return pts;
      }

      function smooth(pts) {
        if (pts.length < 2) return `M ${pts[0]?.[0]??0} ${pts[0]?.[1]??0}`;
        let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = pts[Math.max(0,i-1)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(pts.length-1,i+2)];
          d += ` C ${(p1[0]+(p2[0]-p0[0])/4.5).toFixed(1)} ${(p1[1]+(p2[1]-p0[1])/4.5).toFixed(1)}, ${(p2[0]-(p3[0]-p1[0])/4.5).toFixed(1)} ${(p2[1]-(p3[1]-p1[1])/4.5).toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
        }
        return d;
      }

      const base = PT + CH;
      const closeArea = pts => !pts.length ? '' : ` L ${pts[pts.length-1][0].toFixed(1)} ${base} L ${pts[0][0].toFixed(1)} ${base} Z`;

      const defs = mk('defs', {});
      /* Gradiente azul (B - ganador) */
      const gb = mk('linearGradient', { id: 'cd-gb', x1:'0', y1:'0', x2:'0', y2:'1' });
      gb.appendChild(mk('stop', { offset:'0%',   'stop-color': BLUE, 'stop-opacity':'0.22' }));
      gb.appendChild(mk('stop', { offset:'100%', 'stop-color': BLUE, 'stop-opacity':'0.01' }));
      /* Gradiente gris (A) */
      const ga = mk('linearGradient', { id: 'cd-ga', x1:'0', y1:'0', x2:'0', y2:'1' });
      ga.appendChild(mk('stop', { offset:'0%',   'stop-color': GRAY, 'stop-opacity':'0.12' }));
      ga.appendChild(mk('stop', { offset:'100%', 'stop-color': GRAY, 'stop-opacity':'0.01' }));
      defs.appendChild(gb); defs.appendChild(ga);
      svg.appendChild(defs);

      const g = mk('g', {});

      /* Grid horizontal sutil */
      [0, 7, 14, 21, 28].forEach(v => {
        const y = sy(v);
        g.appendChild(mk('line', { x1: PL, y1: y, x2: PL+CW, y2: y, stroke: GRID, 'stroke-width': v===0?'1.5':'1', 'stroke-dasharray': v===0?'':'4 6' }));
        g.appendChild(mk('text', { x: PL-10, y: y+4.5, 'text-anchor':'end', fill: LABEL, 'font-size':'11', 'font-family': fnt, 'font-weight':'400' }, `${v}`));
      });

      const ptsA = buildPts('a'), ptsB = buildPts('b');

      /* Areas */
      if (ptsA.length > 1) g.appendChild(mk('path', { d: smooth(ptsA)+closeArea(ptsA), fill:'url(#cd-ga)' }));
      if (ptsB.length > 1) g.appendChild(mk('path', { d: smooth(ptsB)+closeArea(ptsB), fill:'url(#cd-gb)' }));

      /* Líneas */
      if (ptsA.length > 1) g.appendChild(mk('path', { d: smooth(ptsA), fill:'none', stroke: GRAY, 'stroke-width':'2', 'stroke-linecap':'round', 'stroke-linejoin':'round' }));
      if (ptsB.length > 1) g.appendChild(mk('path', { d: smooth(ptsB), fill:'none', stroke: BLUE, 'stroke-width':'2.8', 'stroke-linecap':'round', 'stroke-linejoin':'round' }));

      /* Dots en cada año (solo los que el sweep ya alcanzó) */
      DATA.forEach((d, i) => {
        if (sx(i) > PL + ease(prog) * CW + 2) return;
        g.appendChild(mk('circle', { cx: sx(i), cy: sy(d.a), r:'4', fill:'#fff', stroke: GRAY, 'stroke-width':'2' }));
        g.appendChild(mk('circle', { cx: sx(i), cy: sy(d.b), r:'5', fill:'#fff', stroke: BLUE, 'stroke-width':'2.5' }));
      });

      /* Dot animado en la punta de B */
      if (ptsB.length > 0) {
        const tip = ptsB[ptsB.length-1];
        g.appendChild(mk('circle', { cx: tip[0], cy: tip[1], r:'5', fill: BLUE }));
        if (prog < 0.99) {
          const pr = 5 + 10*(1-(prog%1));
          g.appendChild(mk('circle', { cx: tip[0], cy: tip[1], r: pr, fill:'none', stroke: BLUE, 'stroke-width':'1.2', opacity: 0.25*(1-prog%1) }));
        }
      }

      /* Etiquetas año */
      DATA.forEach((d, i) => {
        g.appendChild(mk('text', { x: sx(i), y: VH-10, 'text-anchor':'middle', fill: LABEL, 'font-size':'12', 'font-family': fnt, 'font-weight':'400' }, d.label));
      });

      /* Labels finales en chip */
      if (prog > 0.88) {
        const fade = ease(Math.min(1, (prog-0.88)/0.12));
        const lastA = ptsA[ptsA.length-1], lastB = ptsB[ptsB.length-1];
        if (lastA) {
          g.appendChild(mk('rect', { x: PL+CW+6, y: lastA[1]-11, width: 38, height: 20, rx:10, fill: GRAY, opacity: fade*0.15 }));
          g.appendChild(mk('text', { x: PL+CW+25, y: lastA[1]+4, fill: GRAY, 'font-size':'12', 'font-family': fnt, 'font-weight':'600', 'text-anchor':'middle', opacity: fade }, '10'));
        }
        if (lastB) {
          g.appendChild(mk('rect', { x: PL+CW+6, y: lastB[1]-13, width: 38, height: 22, rx:11, fill: BLUE, opacity: fade*0.15 }));
          g.appendChild(mk('text', { x: PL+CW+25, y: lastB[1]+4, fill: BLUE, 'font-size':'13', 'font-family': fnt, 'font-weight':'700', 'text-anchor':'middle', opacity: fade }, '26'));
        }
      }

      svg.appendChild(g);

      if (prog > 0.4 && !statsAnimated) {
        statsAnimated = true;
        animateStat(document.getElementById('cd-statGrowth'), 232, '+', '%', 1100);
        animateStat(document.getElementById('cd-statB'), 26, '', ' mdp', 1100);
        animateStat(document.getElementById('cd-statA'), 10, '', ' mdp', 1100);
      }
    }

    function buildComparisonBars(prog) {
      const svg = document.getElementById('cd-comparisonSvg');
      if (!svg) return;
      svg.innerHTML = '';
      const BLUE  = '#3b5bdb';
      const GRAY  = '#94a3b8';
      const LABEL = '#64748b';
      const GRID  = '#f1f5f9';
      const fnt   = 'DM Sans, system-ui, sans-serif';
      const ease  = p => 1 - Math.pow(1 - p, 3);
      const e     = ease(prog);

      const VW = 960, VH = 380;
      const PAD = 80, TOP = 70, BOT = 50;
      const baseline = VH - BOT;
      const maxBar   = VH - TOP - BOT - 10;
      const maxV     = 28;
      /* A (gris) izquierda, B (azul) derecha dentro de cada grupo */
      const GAP_BETWEEN = 20, BAR_W = 90, GROUP_GAP = 120;
      const groupW = BAR_W * 2 + GAP_BETWEEN;
      const totalW = groupW * 2 + GROUP_GAP;
      const startX = (VW - totalW) / 2;

      const groups = [
        { label: '2020', x: startX,
          bars: [
            { name: 'Mun. A', value: 7.8,  color: GRAY, textColor: LABEL },
            { name: 'Mun. B', value: 8,    color: BLUE, textColor: BLUE  },
          ]
        },
        { label: '2024', x: startX + groupW + GROUP_GAP,
          bars: [
            { name: 'Mun. A', value: 10,   color: GRAY, textColor: LABEL },
            { name: 'Mun. B', value: 26,   color: BLUE, textColor: BLUE  },
          ]
        },
      ];

      /* Líneas de grid horizontales */
      [0, 7, 14, 21, 28].forEach(v => {
        const y = baseline - (v / maxV) * maxBar;
        svg.appendChild(mk('line', { x1: PAD/2, y1: y, x2: VW - PAD/2, y2: y,
          stroke: GRID, 'stroke-width': v===0 ? '1.5' : '1' }));
        if (v > 0) svg.appendChild(mk('text', { x: PAD/2 - 8, y: y+4, 'text-anchor':'end',
          fill: LABEL, 'font-size':'11', 'font-family': fnt }, `${v}`));
      });

      /* Separador vertical entre grupos — línea punteada */
      const midX = startX + groupW + GROUP_GAP / 2;
      svg.appendChild(mk('line', { x1: midX, y1: TOP-10, x2: midX, y2: baseline,
        stroke: '#cbd5e1', 'stroke-width':'1.2', 'stroke-dasharray':'5 6' }));

      groups.forEach(group => {
        /* Etiqueta de año como pill */
        const pillW = 64, pillH = 28, pillX = group.x + groupW/2 - pillW/2;
        svg.appendChild(mk('rect', { x: pillX, y: TOP-48, width: pillW, height: pillH,
          rx: pillH/2, fill: '#f1f5f9' }));
        svg.appendChild(mk('text', { x: group.x + groupW/2, y: TOP-29,
          fill: '#475569', 'font-size':'14', 'font-family': fnt, 'font-weight':'600',
          'letter-spacing':'0.06em', 'text-anchor':'middle' }, group.label));

        group.bars.forEach((bar, i) => {
          const x   = group.x + i * (BAR_W + GAP_BETWEEN);
          const h   = (bar.value / maxV) * maxBar * e;
          const y   = baseline - h;
          const val = bar.value % 1 === 0 ? String(bar.value) : bar.value.toFixed(1);

          /* Barra con solo esquinas superiores redondeadas */
          const r = 10;
          const bx = x, by = Math.max(y, baseline - maxBar);
          const bh = Math.max(1, h);
          const barPath = `M ${bx+r} ${by} h ${BAR_W-2*r} a ${r} ${r} 0 0 1 ${r} ${r} v ${bh-r} h -${BAR_W} v -${bh-r} a ${r} ${r} 0 0 1 ${r} -${r} Z`;
          svg.appendChild(mk('path', { d: barPath, fill: bar.color,
            opacity: bar.color === BLUE ? '0.9' : '0.55' }));

          /* Valor sobre la barra */
          if (e > 0.1) {
            const fontSize = bar.value >= 20 ? 20 : 15;
            svg.appendChild(mk('text', { x: x + BAR_W/2, y: y - 10,
              fill: bar.textColor, 'font-size': fontSize, 'font-family': fnt,
              'font-weight':'700', 'text-anchor':'middle',
              opacity: Math.min(1, e * 1.4) }, val));
          }

          /* Nombre debajo */
          svg.appendChild(mk('text', { x: x + BAR_W/2, y: baseline + 26,
            fill: bar.color === BLUE ? BLUE : LABEL,
            'font-size':'13', 'font-family': fnt, 'font-weight':'500',
            'text-anchor':'middle' }, bar.name));

          /* Badge +232% dentro de la barra ganadora */
          if (bar.value === 26 && prog > 0.5) {
            const badgeO = Math.min(1, (prog-0.5)/0.3);
            const bady = y + h * 0.45;
            svg.appendChild(mk('rect', { x: x+BAR_W/2-28, y: bady-14, width:56, height:24,
              rx:12, fill:'rgba(255,255,255,0.22)', opacity: badgeO }));
            svg.appendChild(mk('text', { x: x+BAR_W/2, y: bady+5,
              fill:'#ffffff', 'font-size':'13', 'font-family': fnt, 'font-weight':'700',
              'text-anchor':'middle', opacity: badgeO }, '+232%'));
          }
        });
      });
    }

    function injectHTML(container) {
      container.innerHTML = `
        <style>
          /* ── Breakout full-width ── */
          #cd-cost-inject-wrapper {
            width: 100vw;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            padding: 0 clamp(1.5rem, 5vw, 4rem);
            box-sizing: border-box;
          }
          #cd-cost-inject { font-family: 'DM Sans', Helvetica, sans-serif; max-width: 1200px; margin: 0 auto; }

          /* ── Chart + stat cards ── */
          #cd-cost-inject .cd-chart-section {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1.8rem;
            align-items: stretch;
            margin-bottom: 2rem;
          }
          #cd-cost-inject .cd-chart-col {
            border: 1px solid hsl(var(--border,214 32% 91%));
            border-radius: 20px;
            background: hsl(var(--card,0 0% 100%));
            padding: 2rem 2rem 1.4rem;
            display: flex; flex-direction: column; gap: 1.2rem;
            min-height: 323px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
          }
          #cd-cost-inject .cd-chart-col-header { display: flex; align-items: center; gap: 1.6rem; }
          #cd-cost-inject .cd-legend-item {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: hsl(var(--muted-foreground,215 16% 47%));
          }
          #cd-cost-inject .cd-legend-pip { width: 22px; height: 3px; border-radius: 2px; }
          #cd-cost-inject .cd-chart-wrap { flex: 1; min-height: 0; }
          #cd-cost-inject .cd-chart-svg { width: 100%; height: 100%; display: block; overflow: visible; min-height: 238px; }

          /* ── Stat cards ── */
          #cd-cost-inject .cd-stat-cards {
            display: flex; flex-direction: column; gap: 14px;
          }
          #cd-cost-inject .cd-stat-card {
            background: hsl(var(--card,0 0% 100%));
            border: 1px solid hsl(var(--border,214 32% 91%));
            border-radius: 16px;
            padding: 1.6rem 1.8rem 1.4rem;
            display: flex; flex-direction: column; gap: 0.35rem; flex: 1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
            transition: box-shadow 200ms;
          }
          #cd-cost-inject .cd-stat-card:hover {
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
          }
          #cd-cost-inject .cd-stat-card.accent {
            background: linear-gradient(135deg, #3b5bdb 0%, #2d4bbd 100%);
            border-color: transparent;
            flex: 1.5;
            box-shadow: 0 8px 32px rgba(59,91,219,0.35), 0 2px 8px rgba(59,91,219,0.2);
          }
          #cd-cost-inject .cd-stat-card.accent:hover {
            box-shadow: 0 12px 40px rgba(59,91,219,0.45), 0 4px 12px rgba(59,91,219,0.25);
          }
          #cd-cost-inject .cd-stat-label {
            font-size: 0.65rem; font-weight: 600;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: hsl(var(--muted-foreground,215 16% 47%));
          }
          #cd-cost-inject .cd-stat-card.accent .cd-stat-label { color: rgba(255,255,255,0.65); }
          #cd-cost-inject .cd-stat-number {
            font-size: clamp(2.2rem, 3.8vw, 3.6rem); font-weight: 200;
            line-height: 1; letter-spacing: -0.025em;
            color: hsl(var(--foreground,222 84% 5%)); font-variant-numeric: tabular-nums;
          }
          #cd-cost-inject .cd-stat-card.accent .cd-stat-number { color: #fff; }
          #cd-cost-inject .cd-stat-sub {
            font-size: 0.78rem; font-weight: 300;
            color: hsl(var(--muted-foreground,215 16% 47%)); margin-top: 0.2rem;
          }
          #cd-cost-inject .cd-stat-card.accent .cd-stat-sub { color: rgba(255,255,255,0.6); }

          /* ── Comparison bars ── */
          #cd-cost-inject .cd-comparison-wrap {
            border-radius: 20px; overflow: hidden;
            border: 1px solid hsl(var(--border,214 32% 91%));
            background: hsl(var(--card,0 0% 100%));
            margin-bottom: 2rem;
            min-height: 306px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
          }
          #cd-cost-inject .cd-comparison-svg { display: block; width: 100%; height: auto; min-height: 306px; overflow: visible; }

          @media (max-width: 780px) {
            #cd-cost-inject .cd-chart-section { grid-template-columns: 1fr; }
            #cd-cost-inject .cd-stat-cards { flex-direction: row; flex-wrap: wrap; }
            #cd-cost-inject .cd-stat-card.accent { flex: 1 1 100%; }
          }
        </style>
        <div id="cd-cost-inject-wrapper"><div id="cd-cost-inject">
          <div class="cd-chart-section" id="cd-chartSection">
            <div class="cd-chart-col">
              <div class="cd-chart-col-header">
                <span class="cd-legend-item"><span class="cd-legend-pip" style="background:#94a3b8"></span>Municipio A</span>
                <span class="cd-legend-item"><span class="cd-legend-pip" style="background:#3b5bdb"></span>Municipio B</span>
              </div>
              <div class="cd-chart-wrap">
                <svg id="cd-chartSvg" class="cd-chart-svg" viewBox="0 0 580 300" preserveAspectRatio="xMidYMid meet"></svg>
              </div>
            </div>
            <div class="cd-stat-cards">
              <div class="cd-stat-card accent">
                <span class="cd-stat-label">Crecimiento · Municipio B</span>
                <span class="cd-stat-number" id="cd-statGrowth">+0%</span>
                <span class="cd-stat-sub">en 4 años</span>
              </div>
              <div class="cd-stat-card">
                <span class="cd-stat-label">Recaudación · Municipio B</span>
                <span class="cd-stat-number" id="cd-statB">0 mdp</span>
                <span class="cd-stat-sub">al año 4</span>
              </div>
              <div class="cd-stat-card">
                <span class="cd-stat-label">Recaudación · Municipio A</span>
                <span class="cd-stat-number" id="cd-statA">0 mdp</span>
                <span class="cd-stat-sub">al año 4</span>
              </div>
            </div>
          </div>
          <div class="cd-comparison-wrap">
            <svg id="cd-comparisonSvg" class="cd-comparison-svg" viewBox="0 0 960 380" preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div></div>
      `;

      buildChart(0);
      buildComparisonBars(0);

      setTimeout(() => {
        const t0 = performance.now(), dur = 1600;
        function frame(now) {
          const p = Math.min(1, (now - t0) / dur);
          buildChart(p);
          if (p < 1) requestAnimationFrame(frame); else chartDrawn = true;
        }
        requestAnimationFrame(frame);
      }, 500);

      setTimeout(() => {
        const t0 = performance.now(), dur = 1300;
        function frameBars(now) {
          const p = Math.min(1, (now - t0) / dur);
          buildComparisonBars(p);
          if (p < 1) requestAnimationFrame(frameBars); else barsDrawn = true;
        }
        requestAnimationFrame(frameBars);
      }, 760);
    }

    function tryInject() {
      /* Busca el h2/h3 que contiene el título de la sección cost */
      const all = document.querySelectorAll('h2, h3');
      let target = null;
      for (const el of all) {
        if (el.textContent.includes('La información que no tienes')) {
          target = el;
          break;
        }
      }
      if (!target) return false;

      /* Subimos hasta encontrar el contenedor de sección */
      let section = target;
      for (let i = 0; i < 6; i++) {
        if (!section.parentElement) break;
        section = section.parentElement;
        /* buscamos el contenedor que tiene la tabla */
        if (section.querySelector('table')) break;
      }

      /* Reemplazamos solo el contenido después del párrafo intro */
      const table = section.querySelector('table');
      if (!table) return false;
      const tableWrap = table.closest('div') || table.parentElement;
      if (tableWrap) {
        /* Ampliar el contenedor padre para que ocupe ancho completo */
        let ancestor = tableWrap;
        for (let i = 0; i < 4; i++) {
          if (!ancestor.parentElement) break;
          ancestor = ancestor.parentElement;
          const style = window.getComputedStyle(ancestor);

    function applyFix() {
      /* Buscar todos los elementos que contengan solo un dígito 1-5 y estén dentro de la sección de procesos */
      const headings = [...document.querySelectorAll('h2,h3')];
      const processH = headings.find(h => h.textContent.includes('De información dispersa'));
      if (!processH) return false;

      /* Subir hasta la sección contenedora */
      let section = processH;
      for (let i = 0; i < 8; i++) {
        if (!section.parentElement) break;
        section = section.parentElement;
        if (section.tagName === 'SECTION' || section.id) break;
      }

      /* Buscar elementos pequeños cuyo texto sea exactamente "1" a "5" */
      const allEls = section.querySelectorAll('*');
      let found = 0;
      for (const el of allEls) {
        const txt = el.textContent.trim();
        if (/^[1-5]$/.test(txt) && el.children.length === 0) {
          el.style.cssText += `
            color: #ffffff !important;
            background: rgba(59,91,219,0.85) !important;
            border: 2px solid rgba(255,255,255,0.5) !important;

            box-shadow: 0 0 0 4px rgba(59,91,219,0.25) !important;
          `;
          found++;
        }
      }
      return found >= 3;

        raf = requestAnimationFrame(tick);
        if (paused) return;
        const p = prog();
        const fill = document.getElementById(`cd-tfill-${cur}`);
        if (fill) fill.style.width = (p * 100) + '%';
        if (p >= 1) goTo((cur + 1) % SLIDES.length);
      }
      raf = requestAnimationFrame(tick);
    }

    const obs = new MutationObserver(() => { if (inject()) obs.disconnect(); });
    obs.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
    setTimeout(() => { inject(); obs.disconnect(); }, 3500);
  })();
  </script>
  </body>
</html>
